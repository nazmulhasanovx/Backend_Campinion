name: Deploy Hostinger Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-campanion-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_PORT: "15532"
      DEPLOY_PATH: /var/www/campanion/backend
      DEPLOY_BRANCH: main
      GITHUB_REPO: nazmulhasanovx/Backend_Campinion.git
      API_DOMAIN: api.cdcbuild.com
      FRONTEND_URL: https://www.cdcbuild.com
      PHP_BIN: php8.4
      PHP_UPLOAD_MAX_FILESIZE: "32M"
      PHP_POST_MAX_SIZE: "40M"
      PHP_MEMORY_LIMIT: "512M"
      RUN_DB_SEED: ${{ secrets.RUN_DB_SEED }}
    steps:
      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          APP_PORT: ${{ env.APP_PORT }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          GITHUB_REPO: ${{ env.GITHUB_REPO }}
          API_DOMAIN: ${{ env.API_DOMAIN }}
          FRONTEND_URL: ${{ env.FRONTEND_URL }}
          PHP_BIN: ${{ env.PHP_BIN }}
          PHP_UPLOAD_MAX_FILESIZE: ${{ env.PHP_UPLOAD_MAX_FILESIZE }}
          PHP_POST_MAX_SIZE: ${{ env.PHP_POST_MAX_SIZE }}
          PHP_MEMORY_LIMIT: ${{ env.PHP_MEMORY_LIMIT }}
          RUN_DB_SEED: ${{ env.RUN_DB_SEED }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_SCHEMA: ${{ secrets.DB_SCHEMA }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: 22
          command_timeout: 55m
          envs: DEPLOY_PATH,APP_PORT,DEPLOY_BRANCH,GITHUB_REPO,API_DOMAIN,FRONTEND_URL,PHP_BIN,PHP_UPLOAD_MAX_FILESIZE,PHP_POST_MAX_SIZE,PHP_MEMORY_LIMIT,RUN_DB_SEED,DB_DATABASE,DB_USERNAME,DB_PASSWORD,DB_HOST,DB_PORT,DB_SCHEMA,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,MAIL_FROM_ADDRESS,MAIL_FROM_NAME
          script: |
            set -euo pipefail

            export COMPOSER_ALLOW_SUPERUSER=1
            export DEBIAN_FRONTEND=noninteractive
            DB_SCHEMA="${DB_SCHEMA:-public}"

            if ! command -v apt-get >/dev/null 2>&1; then
              echo "This workflow supports apt-based VPS provisioning only."
              exit 1
            fi

            apt-get update
            apt-get install -y software-properties-common ca-certificates apt-transport-https lsb-release gnupg curl unzip git nginx certbot python3-certbot-nginx postgresql-client iproute2

            if ! command -v "$PHP_BIN" >/dev/null 2>&1; then
              if ! apt-cache show php8.4-cli >/dev/null 2>&1; then
                add-apt-repository ppa:ondrej/php -y
                apt-get update
              fi

              apt-get install -y \
                php8.4 \
                php8.4-cli \
                php8.4-common \
                php8.4-bcmath \
                php8.4-curl \
                php8.4-gd \
                php8.4-intl \
                php8.4-mbstring \
                php8.4-pgsql \
                php8.4-sqlite3 \
                php8.4-xml \
                php8.4-zip
            fi

            if ! command -v "$PHP_BIN" >/dev/null 2>&1; then
              echo "Required PHP binary '$PHP_BIN' was not found on the VPS."
              exit 1
            fi

            COMPOSER_BIN="$(command -v composer || true)"
            if [ -z "${COMPOSER_BIN:-}" ]; then
              apt-get install -y composer
              COMPOSER_BIN="$(command -v composer)"
            fi

            PHP_VERSION="${PHP_BIN#php}"
            PHP_UPLOADS_INI_CONTENT="$(printf 'upload_max_filesize=%s\npost_max_size=%s\nmemory_limit=%s\nmax_file_uploads=20\n' "$PHP_UPLOAD_MAX_FILESIZE" "$PHP_POST_MAX_SIZE" "$PHP_MEMORY_LIMIT")"

            for sapi in cli fpm; do
              CONF_D_DIR="/etc/php/${PHP_VERSION}/${sapi}/conf.d"
              if [ -d "${CONF_D_DIR}" ]; then
                echo "${PHP_UPLOADS_INI_CONTENT}" | tee "${CONF_D_DIR}/99-campanion-uploads.ini" >/dev/null
              fi
            done

            if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files | grep -q "^php${PHP_VERSION}-fpm.service"; then
              systemctl restart "php${PHP_VERSION}-fpm"
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            REPO_URL="git@github.com:${GITHUB_REPO}"

            if [ ! -d .git ]; then
              git init
              git remote add origin "$REPO_URL"
            else
              git remote set-url origin "$REPO_URL"
            fi

            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            "$PHP_BIN" "$COMPOSER_BIN" install --no-dev --prefer-dist --optimize-autoloader --no-interaction

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            rm -f bootstrap/cache/*.php bootstrap/cache/*.json 2>/dev/null || true

            "$PHP_BIN" -r '
              $path = ".env";
              $contents = file_exists($path) ? file_get_contents($path) : "";
              $contents = preg_replace("/^DATABASE_URL=.*$(\\R)?/m", "", $contents);
              $pairs = [
                "APP_NAME" => "CAMPANION",
                "APP_ENV" => "production",
                "APP_DEBUG" => "false",
                "APP_URL" => "https://".getenv("API_DOMAIN"),
                "FRONTEND_URL" => getenv("FRONTEND_URL"),
                "SESSION_DOMAIN" => ".cdcbuild.com",
                "SANCTUM_STATEFUL_DOMAINS" => "www.cdcbuild.com,cdcbuild.com",
                "DB_CONNECTION" => "pgsql",
                "DB_HOST" => getenv("DB_HOST") ?: "127.0.0.1",
                "DB_PORT" => getenv("DB_PORT") ?: "5432",
                "DB_DATABASE" => getenv("DB_DATABASE"),
                "DB_USERNAME" => getenv("DB_USERNAME"),
                "DB_PASSWORD" => getenv("DB_PASSWORD"),
                "FILESYSTEM_DISK" => "public",
                "QUEUE_CONNECTION" => "database",
                "CACHE_STORE" => "database",
                "SESSION_DRIVER" => "database",
                "MAIL_MAILER" => getenv("MAIL_HOST") ? "smtp" : "log",
                "MAIL_HOST" => getenv("MAIL_HOST") ?: "127.0.0.1",
                "MAIL_PORT" => getenv("MAIL_PORT") ?: "2525",
                "MAIL_USERNAME" => getenv("MAIL_USERNAME"),
                "MAIL_PASSWORD" => getenv("MAIL_PASSWORD"),
                "MAIL_FROM_ADDRESS" => getenv("MAIL_FROM_ADDRESS") ?: "no-reply@cdcbuild.com",
                "MAIL_FROM_NAME" => getenv("MAIL_FROM_NAME") ?: "CAMPANION"
              ];
              foreach ($pairs as $key => $value) {
                if ($value === false || $value === null) {
                  continue;
                }
                $value = (string) $value;
                $quoteKeys = ["APP_NAME", "DB_PASSWORD", "MAIL_PASSWORD", "MAIL_FROM_NAME", "SANCTUM_STATEFUL_DOMAINS"];
                $quoted = (in_array($key, $quoteKeys, true) || preg_match("/[\\s#=\"]/", $value))
                  ? "\"".addcslashes($value, "\\\"")."\""
                  : $value;
                if (preg_match("/^".$key."=/m", $contents)) {
                  $contents = preg_replace("/^".$key."=.*/m", $key."=".$quoted, $contents);
                } else {
                  $contents .= PHP_EOL.$key."=".$quoted;
                }
              }
              file_put_contents($path, ltrim(rtrim($contents).PHP_EOL, PHP_EOL));
            '

            if [ -f vendor/autoload.php ]; then
              "$PHP_BIN" artisan down || true
            fi

            grep -q "^APP_KEY=base64:" .env || "$PHP_BIN" artisan key:generate --force

            if command -v sudo >/dev/null 2>&1; then
              sudo -u postgres psql \
                --dbname="$DB_DATABASE" \
                --set=ON_ERROR_STOP=1 \
                --command="
                  GRANT USAGE, CREATE ON SCHEMA ${DB_SCHEMA} TO \"${DB_USERNAME}\";
                  GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA ${DB_SCHEMA} TO \"${DB_USERNAME}\";
                  GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA ${DB_SCHEMA} TO \"${DB_USERNAME}\";
                  ALTER DEFAULT PRIVILEGES IN SCHEMA ${DB_SCHEMA} GRANT ALL PRIVILEGES ON TABLES TO \"${DB_USERNAME}\";
                  ALTER DEFAULT PRIVILEGES IN SCHEMA ${DB_SCHEMA} GRANT ALL PRIVILEGES ON SEQUENCES TO \"${DB_USERNAME}\";
                "
            fi

            "$PHP_BIN" artisan optimize:clear
            "$PHP_BIN" artisan migrate --force
            if [ "${RUN_DB_SEED:-false}" = "true" ]; then
              "$PHP_BIN" artisan db:seed --force
            fi
            "$PHP_BIN" artisan storage:link || true
            "$PHP_BIN" artisan optimize
            chmod -R 775 storage bootstrap/cache
            mkdir -p storage/logs storage/app

            if [ -f storage/app/laravel-serve.pid ]; then
              kill "$(cat storage/app/laravel-serve.pid)" 2>/dev/null || true
              rm -f storage/app/laravel-serve.pid
            fi
            sleep 2
            if ss -ltn | awk '{print $4}' | grep -Eq "[:.]${APP_PORT}$"; then
              echo "Port ${APP_PORT} is already in use by another service. Choose a different Campanion backend port before deploying."
              ss -ltnp | grep -E "[:.]${APP_PORT}[[:space:]]" || true
              "$PHP_BIN" artisan up || true
              exit 1
            fi

            nohup "$PHP_BIN" artisan serve --host=127.0.0.1 --port="$APP_PORT" > storage/logs/laravel-serve.log 2>&1 &
            echo $! > storage/app/laravel-serve.pid

            if [ -f storage/app/queue-work.pid ]; then
              kill "$(cat storage/app/queue-work.pid)" 2>/dev/null || true
              rm -f storage/app/queue-work.pid
            fi

            nohup "$PHP_BIN" artisan queue:work --tries=3 --timeout=120 > storage/logs/queue-work.log 2>&1 &
            echo $! > storage/app/queue-work.pid

            cat > "/etc/nginx/sites-available/${API_DOMAIN}" <<NGINX
            server {
                listen 80;
                listen [::]:80;
                server_name ${API_DOMAIN};

                client_max_body_size 40M;

                location / {
                    proxy_pass http://127.0.0.1:${APP_PORT};
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINX

            ln -sf "/etc/nginx/sites-available/${API_DOMAIN}" "/etc/nginx/sites-enabled/${API_DOMAIN}"
            nginx -t
            systemctl reload nginx

            certbot --nginx -d "$API_DOMAIN" --non-interactive --agree-tos --register-unsafely-without-email --redirect || true
            systemctl reload nginx

            "$PHP_BIN" artisan up
